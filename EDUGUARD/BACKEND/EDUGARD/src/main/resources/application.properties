# ============================
# EduGuardian 2.0 Configuration
# ============================

spring.application.name=EduGuardian

# ---- Server ----
server.port=8080

# ---- Database (MySQL - Production) ----
spring.datasource.url=jdbc:mysql://localhost:3306/eduguardian?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=**********
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ---- JWT ----
jwt.secret=${JWT_SECRET:eduguardian2024SecretKeyForJWTAuthenticationThatIsLongEnoughForHS256}
jwt.expiration=86400000

# ---- CORS ----
cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ---- AI Service ----
ai.service.url=${AI_SERVICE_URL:http://localhost:8000}

# ---- File Upload ----
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ---- Logging ----
logging.level.com.eduguardian=DEBUG
logging.level.org.springframework.security=WARN

# ---- Jackson Serialization ----
spring.jackson.serialization.write-dates-as-timestamps=false
